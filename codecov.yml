coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        target: auto
        informational: true

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false

flags:
  frontend:
    paths:
      - src/
    carryforward: true
  backend:
    paths:
      - src-tauri/src/
    carryforward: true

ignore:
  - "src/components/ui/**"
  - "src/ipc/**"
  - "src/main.tsx"
  - "src/types.ts"
  - "src/vite-env.d.ts"
  - "src-tauri/src/main.rs"
