name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  verify-tag-on-main:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure tag is reachable from main
        run: |
          set -euo pipefail
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} ($GITHUB_SHA) is not on main. Release builds only run for tags pointing to a commit on main."
            exit 1
          fi

  checks:
    needs: verify-tag-on-main
    uses: ./.github/workflows/checks.yml

  create-release:
    needs: checks
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: Create or reuse draft release
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Reuse an existing release for this tag if one is already there
          # (e.g. on a workflow re-run); otherwise create a fresh draft.
          if release_id=$(gh api "repos/$REPO/releases/tags/$TAG" --jq '.id' 2>/dev/null); then
            echo "Reusing existing release $release_id for $TAG"
          else
            release_id=$(gh api \
              -X POST "repos/$REPO/releases" \
              -f tag_name="$TAG" \
              -f name="PowaDB $TAG" \
              -f body="See the assets below to download and install." \
              -F draft=true \
              -F prerelease=false \
              --jq '.id')
            echo "Created draft release $release_id for $TAG"
          fi
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install JS deps
        run: npm ci

      - name: Build & upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: false
          args: ${{ matrix.args }}

  publish-release:
    needs: [create-release, build]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Un-draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
          REPO: ${{ github.repository }}
        run: |
          gh api -X PATCH "repos/$REPO/releases/$RELEASE_ID" \
            -F draft=false \
            -F prerelease=false
