name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  verify-tag-on-main:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure tag is reachable from main
        run: |
          set -euo pipefail
          git fetch origin main --depth=0
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} ($GITHUB_SHA) is not on main. Release builds only run for tags pointing to a commit on main."
            exit 1
          fi

  checks:
    needs: verify-tag-on-main
    uses: ./.github/workflows/checks.yml

  build:
    needs: checks
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install JS deps
        run: npm ci

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          VITE_UPDATER_GH_TOKEN: ${{ secrets.UPDATER_PAT }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "PowaDB ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: false
          args: ${{ matrix.args }}

  publish-manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Rewrite latest.json with API asset URLs and force-push to release-manifest branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Pull the manifest tauri-action just uploaded.
          gh release download "$TAG" --repo "$REPO" --pattern latest.json --output original.json

          # Build a {asset_name -> asset_id} map for this release.
          gh api "repos/$REPO/releases/tags/$TAG" \
            --jq '.assets | map({(.name): .id}) | add' > assets.json

          # Replace each platform's url with the api.github.com asset endpoint
          # (which honors Authorization headers; the public download URL doesn't).
          jq --slurpfile assets assets.json --arg repo "$REPO" '
            .platforms |= with_entries(
              .value.url as $url
              | ($url | split("/") | last) as $name
              | $assets[0][$name] as $id
              | .value.url = "https://api.github.com/repos/\($repo)/releases/assets/\($id)"
            )
          ' original.json > latest.json

          # Force-push manifest to its own orphan branch so the updater has a
          # stable URL (raw.githubusercontent.com/.../release-manifest/latest.json).
          # Build the branch contents in a fresh repo to keep the build
          # checkout untouched.
          mkdir manifest-tree
          cp latest.json manifest-tree/
          cd manifest-tree
          git init -q -b release-manifest
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config commit.gpgsign false
          git add latest.json
          git commit -q -m "release: $TAG manifest"
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" \
            release-manifest:release-manifest
