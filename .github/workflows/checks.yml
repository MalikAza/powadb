name: checks

on:
  workflow_call:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  checks:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install JS deps
        run: npm ci

      - name: Frontend lint (biome)
        run: npm run lint

      - name: Frontend typecheck (tsc)
        run: npm run typecheck

      - name: Frontend tests (vitest + coverage)
        run: npm run test:coverage

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Backend rustfmt
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Backend cargo check
        working-directory: src-tauri
        run: cargo check

      - name: Backend cargo clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Backend tests (cargo test + coverage)
        working-directory: src-tauri
        run: cargo llvm-cov --lib --lcov --output-path lcov.info

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./src-tauri/lcov.info
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
